<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FinançasMaiara 💜</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F8F6FF;--surface:#FFFFFF;
  --lilac:#C4A8E8;--lilacMid:#A882D4;--lilacDeep:#7C52B8;
  --lilacLight:#EDE6FA;--lilacSoft:#F3EFFE;
  --green:#5BB98B;--greenL:#E8F7F0;
  --red:#E8637A;--redL:#FDF0F3;
  --yellow:#F0A947;--yellowL:#FEF6E8;
  --text:#1E1535;--muted:#7B6FA3;--border:#E5DCFA;
}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
button{cursor:pointer;font-family:inherit}
input,select{font-family:inherit}
.app{display:flex;min-height:100vh}

/* SIDEBAR */
.sidebar{width:220px;background:var(--surface);border-right:1.5px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:100;transition:transform .25s}
.sidebar-logo{padding:22px 20px 18px;border-bottom:1px solid var(--border)}
.logo-icon{width:40px;height:40px;border-radius:13px;background:linear-gradient(135deg,var(--lilacDeep),var(--lilacMid));display:flex;align-items:center;justify-content:center;font-size:20px;margin-bottom:8px}
.logo-title{font-weight:900;font-size:16px;color:var(--text)}
.logo-sub{font-size:11px;color:var(--muted);margin-top:2px}
.nav-list{padding:14px 12px;flex:1;overflow-y:auto}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:12px;border:none;background:none;width:100%;text-align:left;font-size:13.5px;font-weight:600;color:var(--muted);margin-bottom:4px;transition:all .15s}
.nav-item:hover{background:var(--lilacSoft);color:var(--lilacDeep)}
.nav-item.active{background:var(--lilacLight);color:var(--lilacDeep)}
.nav-icon{width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:transparent;transition:background .15s}
.nav-item.active .nav-icon{background:var(--lilacDeep)}
.nav-item.active .nav-icon svg{stroke:#fff}

/* MAIN */
.main{margin-left:220px;flex:1;min-height:100vh}
.topbar{background:var(--surface);border-bottom:1.5px solid var(--border);padding:16px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.topbar-title{font-weight:800;font-size:20px;color:var(--text)}
.month-nav{display:flex;align-items:center;gap:10px}
.month-btn{background:var(--lilacLight);border:none;border-radius:9px;width:32px;height:32px;font-size:16px;color:var(--lilacDeep);font-weight:900;display:flex;align-items:center;justify-content:center}
.month-label{font-weight:700;font-size:14px;color:var(--text);min-width:140px;text-align:center;text-transform:capitalize}
.content{padding:24px 28px;max-width:1200px}

/* CARDS */
.card{background:var(--surface);border-radius:16px;padding:20px;box-shadow:0 2px 14px rgba(124,82,184,.07)}
.cards-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:22px}
.stat-card{background:var(--surface);border-radius:14px;padding:18px;box-shadow:0 2px 12px rgba(124,82,184,.07)}
.stat-label{font-size:11.5px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px}
.stat-value{font-size:22px;font-weight:900}
.stat-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;margin-bottom:12px}

/* TABLE */
.tbl{width:100%;border-collapse:collapse;font-size:13.5px}
.tbl th{text-align:left;padding:10px 12px;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;border-bottom:2px solid var(--border)}
.tbl td{padding:11px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:var(--lilacSoft)}

/* BADGES */
.badge{display:inline-block;font-size:11px;font-weight:700;border-radius:20px;padding:3px 10px}
.badge-green{color:var(--green);background:var(--greenL)}
.badge-red{color:var(--red);background:var(--redL)}
.badge-lilac{color:var(--lilacDeep);background:var(--lilacLight)}
.badge-yellow{color:var(--yellow);background:var(--yellowL)}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(100,70,160,.18);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:#fff;border-radius:20px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;box-shadow:0 8px 40px rgba(124,82,184,.18)}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:20px 24px 16px;border-bottom:1px solid var(--border)}
.modal-title{font-weight:800;font-size:17px}
.modal-body{padding:22px 24px}
.field{margin-bottom:14px}
.field label{display:block;font-size:11.5px;font-weight:700;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.04em}
.inp{width:100%;padding:10px 12px;border-radius:10px;border:1.5px solid var(--border);background:var(--lilacSoft);font-size:14px;color:var(--text);outline:none}
.inp:focus{border-color:var(--lilacMid)}

/* BUTTONS */
.btn{border:none;border-radius:11px;padding:11px 18px;font-weight:700;font-size:14px;cursor:pointer;display:inline-flex;align-items:center;gap:7px;transition:opacity .15s}
.btn:hover{opacity:.88}
.btn-primary{background:var(--lilacDeep);color:#fff}
.btn-green{background:var(--green);color:#fff}
.btn-sm{padding:7px 12px;font-size:12.5px;border-radius:9px}
.btn-ghost{background:var(--lilacLight);color:var(--lilacDeep)}
.btn-red{background:var(--redL);color:var(--red)}
.btn-yellow{background:var(--yellowL);color:var(--yellow)}

/* CHART CONTAINERS */
.chart-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:22px}
.chart-box{background:var(--surface);border-radius:16px;padding:20px;box-shadow:0 2px 14px rgba(124,82,184,.07)}
.chart-title{font-weight:800;font-size:14px;margin-bottom:16px;color:var(--text)}

/* PROGRESS BAR */
.prog-bar{background:var(--border);border-radius:8px;height:8px;margin-top:6px}
.prog-fill{height:8px;border-radius:8px;transition:width .4s}

/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;background:var(--lilacDeep);color:#fff;border-radius:12px;padding:13px 20px;font-weight:700;font-size:14px;z-index:999;box-shadow:0 4px 20px rgba(124,82,184,.3);animation:slidein .25s ease}
@keyframes slidein{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

/* HERO GRADIENT CARD */
.hero-card{background:linear-gradient(135deg,var(--lilacDeep),var(--lilacMid));border-radius:20px;padding:28px;color:#fff;margin-bottom:22px}

/* INVEST */
.invest-row{display:flex;align-items:center;gap:12px;padding:13px 0;border-bottom:1px solid var(--border)}

/* MOBILE */
@media(max-width:768px){
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .main{margin-left:0}
  .chart-grid{grid-template-columns:1fr}
  .content{padding:16px}
  .topbar{padding:13px 16px}
  .cards-row{grid-template-columns:1fr 1fr}
  .menu-btn{display:flex!important}
}
.menu-btn{display:none;background:var(--lilacLight);border:none;border-radius:9px;padding:7px;align-items:center;justify-content:center}
.overlay-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:99}
.overlay-bg.show{display:block}
</style>
</head>
<body>
<div class="app">

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <div class="logo-icon">💜</div>
    <div class="logo-title">FinançasMaiara</div>
    <div class="logo-sub">Controle financeiro pessoal</div>
  </div>
  <div class="nav-list" id="navList"></div>
</div>
<div class="overlay-bg" id="overlayBg" onclick="closeSidebar()"></div>

<!-- MAIN -->
<div class="main">
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:12px">
      <button class="menu-btn" id="menuBtn" onclick="toggleSidebar()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--lilacDeep)" stroke-width="2.5" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <div class="topbar-title" id="pageTitle">Dashboard</div>
    </div>
    <div class="month-nav">
      <button class="month-btn" onclick="changeMonth(-1)">‹</button>
      <div class="month-label" id="monthLabel"></div>
      <button class="month-btn" onclick="changeMonth(1)">›</button>
    </div>
  </div>
  <div class="content" id="content"></div>
</div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" style="display:none" onclick="closeModalOutside(event)">
  <div class="modal" id="modalBox">
    <div class="modal-head">
      <div class="modal-title" id="modalTitle"></div>
      <button onclick="closeModal()" style="background:var(--lilacLight);border:none;border-radius:9px;padding:7px;cursor:pointer">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--lilacDeep)" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
// DATA LAYER — localStorage persistence
// ═══════════════════════════════════════════════════════════
const KEYS = {
  payables:'fm_payables', receivables:'fm_receivables',
  cards:'fm_cards', cardExp:'fm_cardExp',
  banks:'fm_banks', extracts:'fm_extracts',
  investments:'fm_investments'
};
function load(k){ try{return JSON.parse(localStorage.getItem(k)||'[]')}catch{return[]} }
function save(k,v){ localStorage.setItem(k,JSON.stringify(v)) }

let DB = {
  payables: load(KEYS.payables),
  receivables: load(KEYS.receivables),
  cards: load(KEYS.cards),
  cardExp: load(KEYS.cardExp),
  banks: load(KEYS.banks),
  extracts: load(KEYS.extracts),
  investments: load(KEYS.investments)
};

// seed demo data if empty
if(!DB.banks.length){
  DB.banks=[{id:1,bank:'Nubank',type:'Conta Digital',balance:2340.50},{id:2,bank:'Itaú',type:'Poupança',balance:8000}];
  DB.cards=[{id:1,name:'Nubank Roxinho',brand:'Mastercard',limit:5000,closing:10,due:17,bank:'Nubank'}];
  DB.payables=[{id:1,desc:'Aluguel',value:1200,due:today(),bank:'Nubank',cat:'Casa',paid:false},
               {id:2,desc:'Internet',value:120,due:today(),bank:'Itaú',cat:'Casa',paid:true}];
  DB.receivables=[{id:1,desc:'Salário',value:4500,due:today(),bank:'Nubank',cat:'Renda',received:false}];
  DB.cardExp=[{id:1,cardId:1,desc:'Mercado',value:320,date:today(),cat:'Alimentação',installments:1,month:currentMonth()},
              {id:2,cardId:1,desc:'Farmácia',value:85.5,date:today(),cat:'Saúde',installments:1,month:currentMonth()}];
  DB.investments=[{id:1,name:'Tesouro Selic 2029',type:'Renda Fixa',bank:'Itaú',invested:5000,current:5320,date:'2024-01-10'}];
  saveAll();
}

function saveAll(){ Object.keys(KEYS).forEach(k=>save(KEYS[k],DB[k])) }
function uid(){ return Date.now()+Math.random().toString(36).slice(2) }

// ═══════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════
let currentTab = 'dashboard';
let selMonth = currentMonth();
let chartInstances = {};

const BANKS_LIST = ['Nubank','Itaú','Bradesco','Caixa','Sicoob','BB','Santander','Inter','XP','Outro'];
const CATEGORIES = ['Alimentação','Saúde','Transporte','Educação','Lazer','Casa','Vestuário','Assinaturas','Investimento','Renda','Outros'];
const INVEST_TYPES = ['Renda Fixa','Tesouro Direto','CDB','LCI/LCA','Ações','FII','Cripto','Previdência','Poupança','Outro'];
const CARD_BRANDS = ['Visa','Mastercard','Elo','American Express','Hipercard'];

// ═══════════════════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════════════════
function fmt(n){ return Number(n||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'}) }
function fmtPct(n){ return (Number(n||0)).toFixed(2)+'%' }
function today(){ return new Date().toISOString().slice(0,10) }
function currentMonth(){ return today().slice(0,7) }
function monthLabel(m){
  const [y,mo]=m.split('-');
  return new Date(y,mo-1).toLocaleString('pt-BR',{month:'long',year:'numeric'});
}
function addMonth(m,n){
  const [y,mo]=m.split('-').map(Number);
  const d=new Date(y,mo-1+n);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
}
function changeMonth(n){ selMonth=addMonth(selMonth,n); render() }
function toast(msg,color='var(--lilacDeep)'){
  const t=document.createElement('div');
  t.className='toast';t.style.background=color;t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),2800);
}
function destroyCharts(){
  Object.values(chartInstances).forEach(c=>{try{c.destroy()}catch{}});
  chartInstances={};
}
function icon(name,size=16,color='var(--lilacDeep)'){
  const paths={
    home:"M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z",
    dashboard:"M3 3h7v7H3z M14 3h7v7h-7z M14 14h7v7h-7z M3 14h7v7H3z",
    pay:"M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z",
    receive:"M12 2v20M17 7l-5-5-5 5M17 17l-5 5-5-5",
    card:"M20 7H4a2 2 0 00-2 2v8a2 2 0 002 2h16a2 2 0 002-2V9a2 2 0 00-2-2zM1 10h22",
    bank:"M3 21h18M3 10h18M5 6l7-3 7 3M4 10v11M20 10v11M8 14v3M12 14v3M16 14v3",
    extract:"M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8zM14 2v6h6M16 13H8M16 17H8M10 9H8",
    invest:"M22 12h-4l-3 9L9 3l-3 9H2",
    chart:"M18 20V10M12 20V4M6 20v-6",
    plus:"M12 5v14M5 12h14",
    trash:"M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6",
    edit:"M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z",
    check:"M20 6L9 17l-5-5",
    close:"M18 6L6 18M6 6l12 12",
    download:"M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3",
    upload:"M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12",
    alert:"M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0zM12 9v4M12 17h.01",
    ofx:"M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8zM14 2v6h6M8 13h8M8 17h5",
  };
  const svgPaths = paths[name]||'';
  return `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${svgPaths.split('M').filter(Boolean).map(p=>`<path d="M${p}"/>`).join('')}</svg>`;
}

// ═══════════════════════════════════════════════════════════
// NAV
// ═══════════════════════════════════════════════════════════
const TABS = [
  {id:'dashboard',label:'Dashboard',ico:'dashboard'},
  {id:'pay',label:'A Pagar',ico:'pay'},
  {id:'receive',label:'A Receber',ico:'receive'},
  {id:'card',label:'Cartões',ico:'card'},
  {id:'bank',label:'Bancos',ico:'bank'},
  {id:'extract',label:'Extrato',ico:'extract'},
  {id:'invest',label:'Investimentos',ico:'invest'},
  {id:'reports',label:'Relatórios',ico:'chart'},
];
function buildNav(){
  const nl=document.getElementById('navList');
  nl.innerHTML=TABS.map(t=>`
    <button class="nav-item${currentTab===t.id?' active':''}" onclick="goTab('${t.id}')">
      <div class="nav-icon">${icon(t.ico,17,currentTab===t.id?'#fff':'var(--muted)')}</div>
      ${t.label}
    </button>`).join('');
}
function goTab(t){ currentTab=t; closeSidebar(); render() }
function toggleSidebar(){ document.getElementById('sidebar').classList.toggle('open'); document.getElementById('overlayBg').classList.toggle('show') }
function closeSidebar(){ document.getElementById('sidebar').classList.remove('open'); document.getElementById('overlayBg').classList.remove('show') }

// ═══════════════════════════════════════════════════════════
// TOTALS HELPERS
// ═══════════════════════════════════════════════════════════
function totalPay(m){ return DB.payables.filter(p=>p.due?.startsWith(m)&&!p.paid).reduce((s,p)=>s+Number(p.value),0) }
function totalPaid(m){ return DB.payables.filter(p=>p.due?.startsWith(m)&&p.paid).reduce((s,p)=>s+Number(p.value),0) }
function totalRec(m){ return DB.receivables.filter(r=>r.due?.startsWith(m)&&!r.received).reduce((s,r)=>s+Number(r.value),0) }
function totalReceived(m){ return DB.receivables.filter(r=>r.due?.startsWith(m)&&r.received).reduce((s,r)=>s+Number(r.value),0) }
function totalCardMonth(m){ return DB.cardExp.filter(e=>e.month===m).reduce((s,e)=>s+Number(e.value)/Number(e.installments||1),0) }
function totalBalance(){ return DB.banks.reduce((s,b)=>s+Number(b.balance),0) }
function totalInvested(){ return DB.investments.reduce((s,i)=>s+Number(i.invested),0) }
function totalInvestCurrent(){ return DB.investments.reduce((s,i)=>s+Number(i.current),0) }

// spend by category for a month (payables + card expenses)
function spendByCategory(m){
  const map={};
  DB.payables.filter(p=>p.due?.startsWith(m)).forEach(p=>{
    const c=p.cat||'Outros'; map[c]=(map[c]||0)+Number(p.value);
  });
  DB.cardExp.filter(e=>e.month===m).forEach(e=>{
    const c=e.cat||'Outros'; map[c]=(map[c]||0)+Number(e.value)/Number(e.installments||1);
  });
  return map;
}

// last 6 months evolution
function last6Months(){
  const months=[];
  for(let i=5;i>=0;i--) months.push(addMonth(selMonth,-i));
  return months;
}

// ═══════════════════════════════════════════════════════════
// RENDER ROUTER
// ═══════════════════════════════════════════════════════════
function render(){
  destroyCharts();
  document.getElementById('monthLabel').textContent = monthLabel(selMonth);
  document.getElementById('pageTitle').textContent = TABS.find(t=>t.id===currentTab)?.label||'';
  buildNav();
  const c = document.getElementById('content');
  if(currentTab==='dashboard') c.innerHTML = renderDashboard();
  else if(currentTab==='pay') c.innerHTML = renderPay();
  else if(currentTab==='receive') c.innerHTML = renderReceive();
  else if(currentTab==='card') c.innerHTML = renderCards();
  else if(currentTab==='bank') c.innerHTML = renderBanks();
  else if(currentTab==='extract') c.innerHTML = renderExtract();
  else if(currentTab==='invest') c.innerHTML = renderInvest();
  else if(currentTab==='reports') c.innerHTML = renderReports();
  afterRender();
}

function afterRender(){
  if(currentTab==='dashboard') initDashboardCharts();
  if(currentTab==='reports') initReportCharts();
}

// ═══════════════════════════════════════════════════════════
// DASHBOARD
// ═══════════════════════════════════════════════════════════
function renderDashboard(){
  const tp=totalPay(selMonth), tr=totalRec(selMonth),
        tc=totalCardMonth(selMonth), tb=totalBalance(),
        ti=totalInvestCurrent(), bal=tr-tp-tc;
  const months=last6Months();
  const catMap=spendByCategory(selMonth);
  const cats=Object.keys(catMap).sort((a,b)=>catMap[b]-catMap[a]);
  const totalSpend=Object.values(catMap).reduce((s,v)=>s+v,0);

  // upcoming alerts
  const upcoming = DB.payables.filter(p=>!p.paid&&p.due>=today()&&p.due<=addDays(today(),7)).sort((a,b)=>a.due>b.due?1:-1);

  return `
  <div class="hero-card">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:16px">
      <div>
        <div style="font-size:13px;opacity:.8;margin-bottom:4px">Saldo total nas contas</div>
        <div style="font-size:36px;font-weight:900;letter-spacing:-1px">${fmt(tb)}</div>
        <div style="font-size:12px;opacity:.7;margin-top:6px;text-transform:capitalize">${monthLabel(selMonth)}</div>
      </div>
      <div style="display:flex;gap:20px;flex-wrap:wrap">
        <div style="text-align:right">
          <div style="font-size:11px;opacity:.7">Investimentos</div>
          <div style="font-size:18px;font-weight:800">${fmt(ti)}</div>

function addDays(d,n){
  const dt=new Date(d); dt.setDate(dt.getDate()+n);
  return dt.toISOString().slice(0,10);
}

  const catMap=spendByCategory(selMonth);

          <td style="font-size:13px;color:var(--muted)">${p.due}</td>
          <td><span class="badge badge-lilac">${p.bank||'—'}</span></td>
          <td><span class="badge badge-yellow">${p.cat||'—'}</span></td>
          <td style="font-weight:800;color:${p.paid?'var(--muted)':'var(--red)'}">${fmt(p.value)}</td>
          <td><span class="badge ${p.paid?'badge-green':'badge-red'}">${p.paid?'Pago':'Pendente'}</span></td>

function openPayModal(id){
  const p=id?DB.payables.find(x=>x.id==id):{due:today()};
  openModal(id?'Editar Conta':'Nova Conta a Pagar',`
    <div class="field"><label>Descrição</label><input class="inp" id="f_desc" value="${p.desc||''}" placeholder="Ex: Aluguel"/></div>
    <div class="field"><label>Valor (R$)</label><input class="inp" id="f_val" type="number" min="0" step="0.01" value="${p.value||''}"/></div>

  `);

function savePay(id){
  const desc=v('f_desc'),val=v('f_val'),due=v('f_due'),bank=v('f_bank'),cat=v('f_cat'),rec=v('f_rec');
  if(!desc||!val||!due){toast('Preencha todos os campos obrigatórios','var(--red)');return}
  if(id){
    DB.payables=DB.payables.map(p=>p.id==id?{...p,desc,value:Number(val),due,bank,cat,rec}:p);
  }else{
    DB.payables.push({id:uid(),desc,value:Number(val),due,bank,cat,rec,paid:false});
  }
  saveAll();closeModal();render();toast('Conta salva! 💜');
}

function saveCardExp(cardId){
  const desc=v('f_desc'),val=Number(v('f_val')||0),date=v('f_date'),cat=v('f_cat'),month=v('f_month'),inst=Number(v('f_inst')||1);
  if(!desc||!val){toast('Preencha os campos','var(--red)');return}
  const card=DB.cards.find(c=>c.id==cardId);
  for(let i=0;i<inst;i++){
    const [y,m]=month.split('-').map(Number);
    const d=new Date(y,m-1+i);
    const mo=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    DB.cardExp.push({id:uid(),cardId,desc:desc+(inst>1?` (${i+1}/${inst})`:''),value:val,cat,date,installments:inst,installment:i+1,month:mo});
    // auto-add to payables
    const dueDate=`${mo}-${String(card.due||17).padStart(2,'0')}`;
    const existPay=DB.payables.find(p=>p._cardId==cardId&&p.due?.startsWith(mo));
    if(existPay){
      DB.payables=DB.payables.map(p=>p.id==existPay.id?{...p,value:Number(p.value)+(val/inst)}:p);
    }else{
      DB.payables.push({id:uid(),desc:`Fatura ${card.name}`,value:val/inst,due:dueDate,bank:card.bank,cat:'Cartão',paid:false,_cardId:cardId});
    }
  }
  saveAll();closeModal();render();toast('Despesa lançada!');
}

function openOFXModal(){
  openModal('Importar Extrato OFX',`
    <div style="background:var(--lilacSoft);border-radius:12px;padding:14px;margin-bottom:16px;font-size:13px;color:var(--muted)">
      ${icon('alert',14,'var(--yellow)')} Selecione o banco de destino e o arquivo OFX exportado pelo seu banco.
    </div>
    <div class="field"><label>Conta Bancária</label><select class="inp" id="f_bankId"><option value="">Selecione...</option>${DB.banks.map(b=>`<option value="${b.id}">${b.bank} — ${b.type}</option>`).join('')}</select></div>
    <div class="field"><label>Arquivo OFX</label><input class="inp" id="f_ofx" type="file" accept=".ofx,.OFX" style="padding:8px"/></div>
    <button class="btn btn-primary" style="width:100%;justify-content:center;margin-top:4px" onclick="importOFX()">Importar</button>
  `);
}
function importOFX(){
  const bankId=v('f_bankId');
  const file=document.getElementById('f_ofx')?.files?.[0];
  if(!bankId||!file){toast('Selecione banco e arquivo','var(--red)');return}
  const reader=new FileReader();
  reader.onload=function(e){
    const text=e.target.result;
    const txns=[...text.matchAll(/<STMTTRN>([\s\S]*?)<\/STMTTRN>/gi)];
    let count=0;
    txns.forEach(m=>{
      const block=m[1];
      const getVal=tag=>{ const r=new RegExp(`<${tag}>([^<\r\n]+)`,'i'); const match=r.exec(block); return match?match[1].trim():'' };
      const dtpost=getVal('DTPOSTED');
      const trnamt=parseFloat(getVal('TRNAMT').replace(',','.'));
      const name=getVal('NAME')||getVal('MEMO')||'Transação OFX';
      const fitid=getVal('FITID');
      if(isNaN(trnamt)) return;
      // format date YYYYMMDD -> YYYY-MM-DD
      let date=dtpost;
      if(dtpost.length>=8) date=`${dtpost.slice(0,4)}-${dtpost.slice(4,6)}-${dtpost.slice(6,8)}`;
      // skip duplicates by fitid
      if(fitid&&DB.extracts.find(x=>x.fitid===fitid)) return;
      DB.extracts.push({id:uid(),bankId,desc:name,value:trnamt,type:trnamt>=0?'credit':'debit',date,fitid});
      DB.banks=DB.banks.map(b=>b.id==bankId?{...b,balance:Number(b.balance)+trnamt}:b);
      count++;
    });
    saveAll();closeModal();render();toast(`${count} transações importadas! ✅`,'var(--green)');
  };
  reader.readAsText(file,'latin1');
}

  if(DB.banks.length&&document.getElementById('rptBank')){
    chartInstances.rptBank=new Chart(document.getElementById('rptBank'),{
      type:'doughnut',
      data:{labels:DB.banks.map(b=>b.bank),datasets:[{data:DB.banks.map(b=>Math.max(0,b.balance)),backgroundColor:CHART_COLORS,borderWidth:2,borderColor:'#fff'}]},
      options:{responsive:true,plugins:{legend:{position:'bottom',labels:{font:{size:11}}}}}
    });
  }
  if(DB.investments.length&&document.getElementById('rptInvest')){
    const types={};
    DB.investments.forEach(i=>{types[i.type]=(types[i.type]||0)+Number(i.current)});
    chartInstances.rptInvest=new Chart(document.getElementById('rptInvest'),{
      type:'doughnut',
      data:{labels:Object.keys(types),datasets:[{data:Object.values(types),backgroundColor:CHART_COLORS,borderWidth:2,borderColor:'#fff'}]},
      options:{responsive:true,plugins:{legend:{position:'bottom',labels:{font:{size:11}}}}}
    });
  }
}

// ═══════════════════════════════════════════════════════════
// EXPORT EXCEL
// ═══════════════════════════════════════════════════════════
function exportExcel(){
  const wb=XLSX.utils.book_new();
  // Sheet 1: A Pagar
  const payData=DB.payables.map(p=>({Descrição:p.desc,Valor:p.value,Vencimento:p.due,Banco:p.bank||'',Categoria:p.cat||'',Status:p.paid?'Pago':'Pendente'}));
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(payData),'A Pagar');
  // Sheet 2: A Receber
  const recData=DB.receivables.map(r=>({Descrição:r.desc,Valor:r.value,Data:r.due,Banco:r.bank||'',Categoria:r.cat||'',Status:r.received?'Recebido':'Aguardando'}));
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(recData),'A Receber');
  // Sheet 3: Cartões
  const cardData=DB.cardExp.map(e=>{const c=DB.cards.find(x=>x.id==e.cardId);return{Cartão:c?.name||'',Descrição:e.desc,Valor:e.value,Parcela:`${e.installment}/${e.installments}`,Categoria:e.cat||'',Data:e.date,Mês:e.month}});
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(cardData),'Cartões');
  // Sheet 4: Extrato
  const extData=DB.extracts.map(e=>{const b=DB.banks.find(x=>x.id==e.bankId);return{Banco:b?.bank||'',Descrição:e.desc,Valor:e.value,Tipo:e.value>=0?'Entrada':'Saída',Data:e.date}});
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(extData),'Extrato');
  // Sheet 5: Investimentos
  const invData=DB.investments.map(i=>({Nome:i.name,Tipo:i.type,Banco:i.bank||'',Investido:i.invested,'Valor Atual':i.current,Rendimento:Number(i.current)-Number(i.invested),'Rentab %':i.invested?(((Number(i.current)-Number(i.invested))/Number(i.invested))*100).toFixed(2)+'%':'—',Data:i.date||''}));
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(invData),'Investimentos');
  // Sheet 6: Gastos por Categoria
  const catMap=spendByCategory(selMonth);
  const catData=Object.keys(catMap).map(c=>({Categoria:c,Total:catMap[c]}));
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(catData),'Gastos por Categoria');
  XLSX.writeFile(wb,`FinancasMaiara_${selMonth}.xlsx`);
  toast('Excel exportado! 📊','var(--green)');
}

// ═══════════════════════════════════════════════════════════

  const w=window.open('','_blank');
  w.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"/><title>Relatório Financeiro — ${monthLabel(selMonth)}</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}

    .sub{color:#7B6FA3;font-size:13px;margin-bottom:20px;text-transform:capitalize}
    .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
    .card{background:#F3EFFE;border-radius:10px;padding:14px;text-align:center}
    .card-label{font-size:11px;color:#7B6FA3;font-weight:700;text-transform:uppercase;margin-bottom:4px}
    .card-val{font-size:18px;font-weight:900}
    table{width:100%;border-collapse:collapse;font-size:13px;margin-bottom:16px}
    th{text-align:left;padding:8px 10px;background:#EDE6FA;color:#7C52B8;font-size:11px;text-transform:uppercase}
    td{padding:8px 10px;border-bottom:1px solid #E5DCFA}
    .green{color:#5BB98B} .red{color:#E8637A} .muted{color:#7B6FA3}
    @media print{body{padding:16px}}
  </style></head><body>
  <h1>💜 FinançasMaiara — Relatório Financeiro</h1>
  <div class="sub">${monthLabel(selMonth)}</div>
  <div class="grid">
    <div class="card"><div class="card-label">A Pagar</div><div class="card-val red">${fmt(tp)}</div></div>
    <div class="card"><div class="card-label">A Receber</div><div class="card-val green">${fmt(tr)}</div></div>
    <div class="card"><div class="card-label">Faturas</div><div class="card-val" style="color:#7C52B8">${fmt(tc)}</div></div>
    <div class="card"><div class="card-label">Saldo em Contas</div><div class="card-val green">${fmt(tb)}</div></div>
  </div>
  <h2>Gastos por Categoria</h2>
  <table><tr><th>Categoria</th><th>Valor</th><th>%</th></tr>
  ${cats.map(c=>`<tr><td>${c}</td><td class="red">${fmt(catMap[c])}</td><td class="muted">${(catMap[c]/Math.max(Object.values(catMap).reduce((s,v)=>s+v,0),1)*100).toFixed(1)}%</td></tr>`).join('')}
  </table>
  <h2>Contas a Pagar</h2>
  <table><tr><th>Descrição</th><th>Vencimento</th><th>Banco</th><th>Valor</th><th>Status</th></tr>
  ${DB.payables.filter(p=>p.due?.startsWith(selMonth)).map(p=>`<tr><td>${p.desc}</td><td>${p.due}</td><td>${p.bank||'—'}</td><td class="red">${fmt(p.value)}</td><td>${p.paid?'<span class="green">Pago</span>':'Pendente'}</td></tr>`).join('')}
  </table>
  <h2>A Receber</h2>
  <table><tr><th>Descrição</th><th>Data</th><th>Banco</th><th>Valor</th><th>Status</th></tr>
  ${DB.receivables.filter(r=>r.due?.startsWith(selMonth)).map(r=>`<tr><td>${r.desc}</td><td>${r.due}</td><td>${r.bank||'—'}</td><td class="green">${fmt(r.value)}</td><td>${r.received?'<span class="green">Recebido</span>':'Aguardando'}</td></tr>`).join('')}
  </table>
  <h2>Investimentos</h2>
  <table><tr><th>Nome</th><th>Tipo</th><th>Investido</th><th>Atual</th><th>Rendimento</th></tr>
  ${DB.investments.map(i=>{const g=Number(i.current)-Number(i.invested);return`<tr><td>${i.name}</td><td>${i.type}</td><td>${fmt(i.invested)}</td><td class="green">${fmt(i.current)}</td><td class="${g>=0?'green':'red'}">${fmt(g)}</td></tr>`}).join('')}
  </table>
  <div style="margin-top:24px;font-size:11px;color:#7B6FA3;border-top:1px solid #E5DCFA;padding-top:12px">Gerado em ${new Date().toLocaleString('pt-BR')} · FinançasMaiara</div>
  <script>window.onload=function(){window.print()}<\/script>
  </body></html>`);
  w.document.close();
  toast('PDF gerado! 📄','var(--red)');
}

// ═══════════════════════════════════════════════════════════
// MODAL UTILS
// ═══════════════════════════════════════════════════════════
function openModal(title,body){
  document.getElementById('modalTitle').textContent=title;
  document.getElementById('modalBody').innerHTML=body;
  document.getElementById('modalOverlay').style.display='flex';
}
function closeModal(){ document.getElementById('modalOverlay').style.display='none' }
function closeModalOutside(e){ if(e.target===document.getElementById('modalOverlay')) closeModal() }
function v(id){ const el=document.getElementById(id); return el?el.value:'' }
function selInp(id,options,val=''){
  return `<select class="inp" id="${id}"><option value="">Selecione...</option>${options.map(o=>`<option value="${o}"${val===o?' selected':''}>${o}</option>`).join('')}</select>`;
}
