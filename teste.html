<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Teste de Diagnóstico</title>
</head>
<body style="background:#F8F6FF;padding:30px;font-family:sans-serif;color:#1E1535">
<h1 style="color:#7C52B8">✅ Passo 1: HTML básico funciona!</h1>
<p id="step2">⏳ Testando JavaScript...</p>
<p id="step3">⏳ Testando Chart.js (CDN)...</p>
<p id="step4">⏳ Testando XLSX (CDN)...</p>
<p id="step5">⏳ Testando Supabase (CDN)...</p>

<script>
document.getElementById('step2').textContent = '✅ Passo 2: JavaScript funciona!';
document.getElementById('step2').style.color = 'green';
</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"
  onload="document.getElementById('step3').textContent='✅ Passo 3: Chart.js carregou!';document.getElementById('step3').style.color='green'"
  onerror="document.getElementById('step3').textContent='❌ Passo 3: Chart.js FALHOU ao carregar';document.getElementById('step3').style.color='red'">
</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"
  onload="document.getElementById('step4').textContent='✅ Passo 4: XLSX carregou!';document.getElementById('step4').style.color='green'"
  onerror="document.getElementById('step4').textContent='❌ Passo 4: XLSX FALHOU ao carregar';document.getElementById('step4').style.color='red'">
</script>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"
  onload="document.getElementById('step5').textContent='✅ Passo 5: Supabase carregou! window.supabase existe: ' + (typeof window.supabase);document.getElementById('step5').style.color='green'"
  onerror="document.getElementById('step5').textContent='❌ Passo 5: Supabase FALHOU ao carregar';document.getElementById('step5').style.color='red'">
</script>

<div style="margin-top:30px;padding:16px;background:#EDE6FA;border-radius:12px">
<strong>User Agent:</strong>
<p id="ua" style="font-size:12px;word-break:break-all"></p>
</div>
<script>document.getElementById('ua').textContent = navigator.userAgent;</script>

</body>
</html>
